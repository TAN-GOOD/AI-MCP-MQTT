name: CI

# 触发条件：push 到 master 分支、PR 到 master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Lint 检查（项目暂无测试，仅做静态检查）
  lint-test:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 ruff
        run: pip install ruff

      - name: 运行 ruff check
        run: ruff check app/

  # Docker 镜像构建验证（仅 push 到 master 时触发，不推送镜像）
  docker-build:
    name: Docker Build 验证
    runs-on: ubuntu-latest
    # 仅 push 到 master 时执行，PR 不触发
    if: github.event_name == 'push'
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 构建 Docker 镜像（仅验证构建成功，不推送）
        run: docker build -t xiaozhi-mcp:ci .
