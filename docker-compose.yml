services:
  db:
    image: mysql:8.0
    container_name: xiaozhi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: xiaozhi123456
      MYSQL_DATABASE: xiaozhi_mcp
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    # 不向宿主机暴露 3306，仅容器内网通信，缩小攻击面
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - xiaozhi-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 资源限制：避免单容器吃光宿主机内存/CPU
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'
    # 日志旋转，避免日志撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    container_name: xiaozhi-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:xiaozhi123456@db:3306/xiaozhi_mcp
      # 生产部署请修改为随机密钥：python -c "import secrets;print(secrets.token_hex(32))"
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production-7f3a9b2c8e1d}
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      MCP_ALLOW_INSECURE: "false"
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xiaozhi-net
    # 资源限制：避免单容器吃光宿主机内存/CPU
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'
    # 日志旋转，避免日志撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    # 数据库备份 sidecar：基于 alpine + mysql-client，每小时备份一次
    image: alpine:3.19
    container_name: xiaozhi-db-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 数据库连接信息（与 db 服务保持一致）
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-xiaozhi123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xiaozhi_mcp}
      # backup_db.sh 读取的数据库名变量
      DB_NAME: ${MYSQL_DATABASE:-xiaozhi_mcp}
      # cron 表达式：每小时整点执行一次
      BACKUP_CRON: "0 * * * *"
      # 备份保留天数
      KEEP_DAYS: "7"
    volumes:
      # 只读挂载脚本目录，供容器内调用备份脚本
      - ./scripts:/scripts:ro
      # 挂载备份目录到宿主机，便于持久化与恢复
      - ./backups:/backups
    networks:
      - xiaozhi-net
    # 安装 mysql-client 与 bash，注册 cron 定时任务后启动 crond
    command:
      - sh
      - -c
      - |
        apk add --no-cache mysql-client bash &&
        echo "$$BACKUP_CRON /bin/bash /scripts/backup_db.sh >> /backups/backup.log 2>&1" > /etc/crontabs/root &&
        crond -f -l 8
    # 日志旋转，避免日志撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:

networks:
  # 独立网络：db 与 app 互通，外部容器默认无法访问
  xiaozhi-net:
    driver: bridge
